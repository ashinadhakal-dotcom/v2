name: Phase 1 - Data Seeding Pipeline

on:
  schedule:
    # Run quarterly on the 1st of Jan, Apr, Jul, Oct at 2 AM UTC
    - cron: '0 2 1 1,4,7,10 *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  seed-rag-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd phase1
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cd phase1
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          EOF

      - name: Run full seeding pipeline
        run: |
          cd phase1
          python main.py --all

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: failed-fetches-log
          path: phase1/failed_fetches.log

      - name: Notify completion
        if: always()
        run: |
          echo "Phase 1 seeding completed at $(date)"
          echo "Check Supabase for new chunks and politicians."
