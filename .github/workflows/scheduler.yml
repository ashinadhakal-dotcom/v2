name: Nepal News Bot

on:
  schedule:
    - cron: '*/60 * * * *' # Recommended: Change to 30 mins to avoid GitHub rate limits
  workflow_dispatch:
  # This block allows your website to trigger the bot
  repository_dispatch:
    types: [trigger-news-bot]

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone Scraper
        run: |
          if [ -d scraper_repo ]; then
            cd scraper_repo && git pull || true
          else
            git clone --depth 1 https://github.com/Victor99190/final-scrapeer.git scraper_repo
          fi

      - name: Persist SQLite Database
        uses: actions/cache@v4
        with:
          path: dedup.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: |
            dedup-db-

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm install
      - run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
